<body class="bg-background text-on-background min-h-screen relative font-body-md text-body-md antialiased pb-[88px] md:pb-0 md:pl-72 noise-bg">
<!-- TopAppBar (Mobile) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-background/80 backdrop-blur-md border-b border-outline-variant md:hidden">

</button>
<div class="font-headline-md text-headline-md-mobile font-bold text-primary">QuoteWise</div>
<button class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant hover:opacity-80 transition-opacity">
<img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6hDnc55A74T-2wz4YfQl80G18Z174_t6YGdZAPZwdDD_CgXEl_E63hmVNd9Tce6UXmzGV-dbttNucaJs0SwD85vi-GRC63lwZxuMZevBOUD0bnpRKD_Gi4uLxkv1bDuS8fOMZ5hmVVwYuItt4nMnthTiofUW6VzX5Qx0CiExoEC3hNp21sSZnvFNyxEGODS7KfXwlpGPw03Qh0tMCzAXnoHcpQ_7nFIq50sglbaEi-lYzXBTYo8W8ezoiyQtI2Q0X7_D2vUiOfxs"/>
</button>
</header>

<div class="px-6 mb-8 flex items-center gap-4">
<img alt="User Avatar" class="w-12 h-12 rounded-full border-2 border-outline-variant object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDS4Vnx4plZ4K2CO9OandEq0xNNIm14rqj9tz7qyrNO7XtFKTCYU6NsA4G72pnHBBU3WxKP8XUIYIg-nlD9l1Rxr6HF3UCHpyHFqFTdHwZqDOfiBbTKLwc-1zNKA1GGCLN0zSj47xKQC8cDADidwaWQ9PB-rcD9ie64PNOSKwwSD10ucPRZ4D9w6TeuFYdFMKndMzGMBgSKLIlY6xTUsoNsIW7bQQ9_cfMWaA5rQSHJtHz-ygwDjUxqAkKP1Qo8B0djKSQFGcJSbM8"/>

<div class="font-headline-md text-headline-md-mobile text-primary font-bold">Alex Engineering</div>
<div class="font-label-md text-label-md text-on-surface-variant">Lead Estimator</div>
</div>
</div>
<nav class="flex-1 flex flex-col gap-2">
<a class="bg-secondary-container text-on-secondary-container font-bold rounded-full mx-2 px-4 py-3 flex items-center gap-3 font-label-md text-label-md" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
                Drafts
            </a>
<a class="text-on-surface-variant hover:bg-surface-variant/30 rounded-full mx-2 px-4 py-3 flex items-center gap-3 font-label-md text-label-md hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">bookmark</span>
                Saved
            </a>
<a class="text-on-surface-variant hover:bg-surface-variant/30 rounded-full mx-2 px-4 py-3 flex items-center gap-3 font-label-md text-label-md hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
                History
            </a>
<a class="text-on-surface-variant hover:bg-surface-variant/30 rounded-full mx-2 px-4 py-3 flex items-center gap-3 font-label-md text-label-md hover:bg-surface-container-high transition-colors mt-auto" href="#">
<span class="material-symbols-outlined">person</span>
                Profile
            </a>
</nav>
</aside>
<!-- Main Content Canvas -->
<main class="pt-20 md:pt-8 px-margin-mobile md:px-lg max-w-7xl mx-auto h-full flex flex-col gap-lg">
<!-- Header Section -->
<div class="flex flex-col gap-1">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background">Dashboard Overview</h1>
<p class="text-on-surface-variant font-body-md text-body-md">Welcome back, Alex. Your estimation pipeline is active.</p>
</div>
<!-- Quick Actions (Top Section) -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-md">
<button class="bg-surface-container-lowest border border-outline-variant rounded-DEFAULT p-4 flex flex-col items-center justify-center gap-3 hover:border-primary-container hover:shadow-sm transition-all group active:scale-95">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">edit_document</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Draft...</span>
</button>
<button class="bg-surface-container-lowest border border-outline-variant rounded-DEFAULT p-4 flex flex-col items-center justify-center gap-3 hover:border-primary-container hover:shadow-sm transition-all group active:scale-95">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">bookmark_added</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Saved Quotations...</span>
</button>
<button class="bg-surface-container-lowest border border-outline-variant rounded-DEFAULT p-4 flex flex-col items-center justify-center gap-3 hover:border-primary-container hover:shadow-sm transition-all group active:scale-95">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">visibility</span>
</div>
<span class="font-label-md text-label-md text-on-surface">View Quotations...</span>
</button>
</section>
<!-- Middle Section: Decorative Wave & Metrics Bento -->
<section class="relative bg-surface-container-lowest rounded-lg border border-outline-variant overflow-hidden min-h-[300px] flex flex-col md:flex-row shadow-[0_2px_8px_rgba(0,0,0,0.02)]">
<!-- Metrics -->
<div class="p-6 md:p-8 flex-1 flex flex-col justify-center z-10 bg-surface-container-lowest/80 backdrop-blur-sm md:bg-transparent md:backdrop-blur-none">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-6">Current Pipeline</h2>
<div class="grid grid-cols-2 gap-6">
<div>
<div class="font-display text-display text-on-background">12</div>
<div class="font-label-md text-label-md text-on-surface-variant mt-1">Active Drafts</div>
</div>
<div>
<div class="font-display text-display text-primary-container">4</div>
<div class="font-label-md text-label-md text-on-surface-variant mt-1">Pending Approval</div>
</div>
<div class="col-span-2">
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden mt-2">
<div class="h-full bg-gradient-to-r from-primary-container to-secondary-fixed-dim rounded-full" style="width: 75%"></div>
</div>
<div class="flex justify-between mt-2 font-code text-code text-on-surface-variant">
<span>Monthly Target</span>
<span class="font-bold text-on-background">75%</span>
</div>
</div>
</div>
</div>
<!-- Decorative SVG Wave -->
<div class="absolute inset-0 md:relative md:flex-1 opacity-20 md:opacity-100 pointer-events-none flex items-center justify-center bg-gradient-to-br from-surface-container-lowest to-primary-fixed/20">
<svg class="w-full h-full object-cover text-primary-container" preserveaspectratio="none" viewbox="0 0 400 300">
<path d="M0,150 C100,50 200,250 300,150 C400,50 400,150 400,150 L400,300 L0,300 Z" fill="url(#wave-gradient)" opacity="0.8"></path>
<path d="M0,170 C120,70 180,270 320,170 C400,100 400,170 400,170 L400,300 L0,300 Z" fill="url(#wave-gradient-2)" opacity="0.4"></path>
<defs>
<lineargradient id="wave-gradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="currentColor"></stop>
<stop offset="100%" stop-color="var(--tw-colors-secondary-fixed-dim, #ecc200)"></stop>
</lineargradient>
<lineargradient id="wave-gradient-2" x1="100%" x2="0%" y1="0%" y2="100%">
<stop offset="0%" stop-color="currentColor"></stop>
<stop offset="100%" stop-color="transparent"></stop>
</lineargradient>
</defs>
</svg>
</div>
</section>
</main>
<!-- FAB: Compose Post -->
<button class="fixed bottom-24 md:bottom-8 right-6 z-40 bg-primary-container text-on-primary font-label-md text-label-md rounded-full px-6 py-4 flex items-center gap-2 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all active:scale-95 active:shadow-md border border-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>

    </button>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface-container-lowest/90 backdrop-blur-lg border-t border-outline-variant shadow-[0_-2px_10px_rgba(0,0,0,0.02)] rounded-t-lg md:hidden">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="mt-1 text-xs">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1.5 hover:text-primary transition-colors font-label-md text-label-md">
<span class="material-symbols-outlined">description</span>
<span class="mt-1 text-xs">Quotes</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1.5 hover:text-primary transition-colors font-label-md text-label-md">
<span class="material-symbols-outlined">settings</span>
<span class="mt-1 text-xs">Settings</span>
</button>
